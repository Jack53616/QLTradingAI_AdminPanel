kind = "web"
previewPath = "/"
title = "QL Trading AI - Admin Panel"
version = "1.0.0"
id = "artifacts/ql-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19635

[services.development]
run = "pnpm --filter @workspace/ql-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ql-admin", "run", "build" ]
publicDir = "artifacts/ql-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19635"
BASE_PATH = "/"
